<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENGSE214 - Cybersecurity for Software Engineering</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --accent-purple: #8b5cf6;
            --base-font-size: 22px;
        }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            font-family: 'Prompt', sans-serif;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-size: var(--base-font-size);
        }

        #presentation-container {
            position: relative;
            width: 100vw;
            height: 56.25vw; /* 16:9 Ratio */
            max-height: 100vh;
            max-width: 177.78vh;
            background: url('https://www.transparenttextures.com/patterns/cubes.png'), linear-gradient(135deg, rgba(15,23,42,0.9) 0%, rgba(2,6,23,0.95) 100%);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            overflow: hidden;
            border-radius: 8px;
        }

        /* Slide Core */
        .slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            padding: 4% 6%;
            box-sizing: border-box;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px) scale(0.98);
            transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
            z-index: 10;
        }

        .slide-header {
            border-left: 6px solid var(--accent-cyan);
            padding-left: 20px;
            margin-bottom: 30px;
        }

        .slide-title {
            font-size: 2.2em;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(90deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .slide-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-size: 1.15em;
            line-height: 1.6;
        }

        /* Infographic Elements */
        .grid-2x2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            width: 100%;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .info-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .info-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-cyan);
        }

        .info-card i {
            font-size: 2.5em;
            margin-bottom: 15px;
            display: block;
        }

        .info-card.blue i { color: var(--accent-blue); }
        .info-card.green i { color: var(--accent-green); }
        .info-card.red i { color: var(--accent-red); }
        .info-card.orange i { color: var(--accent-orange); }
        .info-card.purple i { color: var(--accent-purple); }

        .info-card h3 {
            margin-top: 0;
            font-size: 1.3em;
            color: #fff;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .equation-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            font-size: 1.8em;
            font-weight: bold;
            text-align: center;
        }

        .eq-item {
            background: rgba(255,255,255,0.05);
            padding: 20px 30px;
            border-radius: 12px;
            border: 2px solid var(--accent-blue);
        }

        .eq-operator {
            color: var(--accent-orange);
            font-size: 1.5em;
        }

        .timeline {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            padding: 40px 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--accent-cyan);
            z-index: 0;
        }

        .timeline-step {
            position: relative;
            z-index: 1;
            background: var(--bg-dark);
            border: 4px solid var(--accent-cyan);
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            color: white;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
        }

        .timeline-text {
            position: absolute;
            top: 100px;
            text-align: center;
            width: 200px;
            left: -60px;
            font-weight: 600;
        }

        .insight-box {
            background: linear-gradient(90deg, rgba(59,130,246,0.2), transparent);
            border-left: 5px solid var(--accent-blue);
            padding: 20px;
            border-radius: 0 10px 10px 0;
            margin: 15px 0;
        }

        .warning-box {
            background: linear-gradient(90deg, rgba(245,158,11,0.2), transparent);
            border-left: 5px solid var(--accent-orange);
            padding: 20px;
            border-radius: 0 10px 10px 0;
            margin: 15px 0;
        }

        ul.styled-list {
            list-style: none;
            padding-left: 0;
        }

        ul.styled-list li {
            margin-bottom: 15px;
            padding-left: 35px;
            position: relative;
        }

        ul.styled-list li::before {
            content: '\f058';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            left: 0;
            color: var(--accent-green);
        }

        .citation {
            font-size: 0.55em;
            color: var(--text-muted);
            vertical-align: super;
            opacity: 0.7;
        }

        /* Controls UI */
        #controls {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 10px 30px;
            border-radius: 50px;
            display: flex;
            gap: 20px;
            align-items: center;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.1);
        }

        button {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
        }

        button:hover {
            background: var(--accent-blue);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(59,130,246,0.4);
        }

        #slide-counter {
            font-weight: bold;
            min-width: 80px;
            text-align: center;
            letter-spacing: 2px;
        }

        #progress-bar {
            position: absolute;
            bottom: 0; left: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
            transition: width 0.3s ease;
            z-index: 90;
        }

        /* Centralized Title Slide */
        .title-slide {
            text-align: center;
            align-items: center;
        }
        .title-slide .slide-title {
            font-size: 3.8em;
            border: none;
            margin-bottom: 20px;
        }
        .title-slide i {
            font-size: 5em;
            margin-bottom: 20px;
            color: var(--accent-cyan);
        }

    </style>
</head>
<body>

    <div id="presentation-container">
        <div id="slides-wrapper"></div>
        <div id="progress-bar"></div>
        
        <div id="controls">
            <button id="btn-zoom-out" title="ลดขนาดอักษร"><i class="fas fa-search-minus"></i></button>
            <button id="btn-zoom-in" title="เพิ่มขนาดอักษร"><i class="fas fa-search-plus"></i></button>
            <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.2);"></div>
            <button id="btn-prev" title="ก่อนหน้า"><i class="fas fa-chevron-left"></i></button>
            <span id="slide-counter">1 / 37</span>
            <button id="btn-next" title="ถัดไป"><i class="fas fa-chevron-right"></i></button>
            <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.2);"></div>
            <button id="btn-fullscreen" title="เต็มจอ"><i class="fas fa-expand"></i></button>
        </div>
    </div>

        let currentSlide = 0;
        const totalSlides = slideData.length;
        const container = document.getElementById('slides-wrapper');
        const progressBar = document.getElementById('progress-bar');
        const slideCounter = document.getElementById('slide-counter');

        // Initial Render
        slideData.forEach((slide, index) => {
            const slideEl = document.createElement('div');
            slideEl.className = `slide ${slide.isTitle ? 'title-slide' : ''}`;
            
            if (slide.isTitle) {
                slideEl.innerHTML = `<div class="slide-content">${slide.content}</div>`;
            } else {
                slideEl.innerHTML = `
                    <div class="slide-header">
                        <h2 class="slide-title">${slide.title}</h2>
                    </div>
                    <div class="slide-content">
                        ${slide.content}
                    </div>
                `;
            }
            container.appendChild(slideEl);
        });

        function updateSlide() {
            document.querySelectorAll('.slide').forEach((el, index) => {
                el.classList.remove('active');
                if (index === currentSlide) el.classList.add('active');
            });
            
            slideCounter.textContent = `${currentSlide + 1} / ${totalSlides}`;
            progressBar.style.width = `${((currentSlide + 1) / totalSlides) * 100}%`;
            
            document.getElementById('btn-prev').style.opacity = currentSlide === 0 ? '0.3' : '1';
            document.getElementById('btn-next').style.opacity = currentSlide === totalSlides - 1 ? '0.3' : '1';
        }

        // Navigation
        document.getElementById('btn-prev').addEventListener('click', () => {
            if (currentSlide > 0) { currentSlide--; updateSlide(); }
        });
        document.getElementById('btn-next').addEventListener('click', () => {
            if (currentSlide < totalSlides - 1) { currentSlide++; updateSlide(); }
        });

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                if (currentSlide < totalSlides - 1) { currentSlide++; updateSlide(); }
            } else if (e.key === 'ArrowLeft') {
                if (currentSlide > 0) { currentSlide--; updateSlide(); }
            }
        });

        // Font Size Controls
        let currentFontSize = 22;
        document.getElementById('btn-zoom-in').addEventListener('click', () => {
            if (currentFontSize < 32) {
                currentFontSize += 2;
                document.documentElement.style.setProperty('--base-font-size', `${currentFontSize}px`);
            }
        });
        document.getElementById('btn-zoom-out').addEventListener('click', () => {
            if (currentFontSize > 14) {
                currentFontSize -= 2;
                document.documentElement.style.setProperty('--base-font-size', `${currentFontSize}px`);
            }
        });

        // Fullscreen Control
        document.getElementById('btn-fullscreen').addEventListener('click', () => {
            const elem = document.documentElement;
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        });

        // Init
        updateSlide();
    </script>
