    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #f8fafc;
            --slide-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-primary: #2563eb;
            --accent-secondary: #f59e0b;
            --base-font-size: 24px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            font-family: 'Kanit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-size: var(--base-font-size);
            color: var(--text-main);
            transition: font-size 0.3s ease;
        }

        #presentation-area {
            position: relative;
            width: 100vw;
            height: 56.25vw; /* 16:9 Aspect Ratio */
            max-height: 100vh;
            max-width: 177.78vh;
            background-color: var(--primary-bg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            padding: 5% 8%;
            box-sizing: border-box;
            background: var(--slide-bg);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s ease-in-out, transform 0.6s ease-in-out;
            transform: scale(0.95);
            display: flex;
            flex-direction: column;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
            z-index: 10;
        }

        .slide-header {
            border-bottom: 4px solid var(--accent-primary);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .slide-title {
            font-size: 2.2em;
            font-weight: 700;
            color: var(--accent-primary);
            margin: 0;
        }

        .slide-content {
            flex-grow: 1;
            font-size: 1.2em;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        ul {
            margin: 0;
            padding-left: 2em;
        }

        li {
            margin-bottom: 15px;
        }

        .highlight-box {
            background-color: #eff6ff;
            border-left: 6px solid var(--accent-primary);
            padding: 20px;
            border-radius: 0 8px 8px 0;
            margin: 20px 0;
            font-weight: 500;
        }

        .warning-box {
            background-color: #fef3c7;
            border-left: 6px solid var(--accent-secondary);
            padding: 20px;
            border-radius: 0 8px 8px 0;
            margin: 20px 0;
        }

        .citation {
            font-size: 0.6em;
            color: var(--text-muted);
            vertical-align: super;
            margin-left: 4px;
        }

        /* Controls UI */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(5px);
            padding: 10px 25px;
            border-radius: 50px;
            display: flex;
            gap: 20px;
            align-items: center;
            z-index: 100;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        button:hover {
            background: rgba(255,255,255,0.2);
            color: #60a5fa;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #slide-counter {
            color: white;
            font-weight: 600;
            font-size: 1rem;
            min-width: 60px;
            text-align: center;
            font-family: monospace;

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 6px;
            background: var(--accent-primary);
            transition: width 0.4s ease;
            z-index: 50;

        .title-slide {
            text-align: center;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;

            font-size: 3.5em;
            color: white;
            border: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .title-slide .subtitle {
            font-size: 1.5em;
            color: #93c5fd;
            margin-top: 20px;
        }

    </style>
</head>

        let currentSlide = 0;
        const totalSlides = slideData.length;
        const container = document.getElementById('slides-container');
        const progressBar = document.getElementById('progress-bar');
        const slideCounter = document.getElementById('slide-counter');

        // Render Slides
        slideData.forEach((slide, index) => {
            const slideEl = document.createElement('div');
            slideEl.className = `slide ${slide.isTitle ? 'title-slide' : ''}`;
            slideEl.id = `slide-${index}`;
            
            if (slide.isTitle) {
                slideEl.innerHTML = `
                    <h1 class="slide-title">${slide.title}</h1>
                    ${slide.content}
                `;
            } else {
                slideEl.innerHTML = `
                    <div class="slide-header">
                        <h2 class="slide-title">${slide.title}</h2>
                    </div>
                    <div class="slide-content">
                        ${slide.content}
                    </div>
                `;
            }
            container.appendChild(slideEl);
        });

        function updateSlide() {
            document.querySelectorAll('.slide').forEach((el, index) => {
                el.classList.remove('active');
                if (index === currentSlide) {
                    el.classList.add('active');
                }
            });
            
            slideCounter.textContent = `${currentSlide + 1} / ${totalSlides}`;
            progressBar.style.width = `${((currentSlide + 1) / totalSlides) * 100}%`;
            
            document.getElementById('btn-prev').style.opacity = currentSlide === 0 ? '0.3' : '1';
            document.getElementById('btn-prev').style.cursor = currentSlide === 0 ? 'default' : 'pointer';
            document.getElementById('btn-next').style.opacity = currentSlide === totalSlides - 1 ? '0.3' : '1';
            document.getElementById('btn-next').style.cursor = currentSlide === totalSlides - 1 ? 'default' : 'pointer';
        }

        // Navigation
        document.getElementById('btn-prev').addEventListener('click', () => {
            if (currentSlide > 0) {
                currentSlide--;
                updateSlide();
            }
        });

        document.getElementById('btn-next').addEventListener('click', () => {
            if (currentSlide < totalSlides - 1) {
                currentSlide++;
                updateSlide();
            }
        });

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                if (currentSlide < totalSlides - 1) { currentSlide++; updateSlide(); }
            } else if (e.key === 'ArrowLeft') {
                if (currentSlide > 0) { currentSlide--; updateSlide(); }
            }
        });

        // Font Size Controls
        let currentFontSize = 24;
        document.getElementById('btn-zoom-in').addEventListener('click', () => {
            if (currentFontSize < 36) {
                currentFontSize += 2;
                document.body.style.setProperty('--base-font-size', `${currentFontSize}px`);
            }
        });

        document.getElementById('btn-zoom-out').addEventListener('click', () => {
            if (currentFontSize > 16) {
                currentFontSize -= 2;
                document.body.style.setProperty('--base-font-size', `${currentFontSize}px`);
            }
        });

        // Fullscreen Control
        document.getElementById('btn-fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        // Initialize
        updateSlide();
    </script>
