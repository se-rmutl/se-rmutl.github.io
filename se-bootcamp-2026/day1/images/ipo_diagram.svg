<svg viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg" font-family="Kanit, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
    <linearGradient id="gInput" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D4ED8"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="gProcess" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="gOutput" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <linearGradient id="gStorage" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97706"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
  </defs>
  <!-- Input -->
  <rect x="10" y="80" width="200" height="140" rx="16" fill="url(#gInput)" opacity="0.9"/>
  <text x="110" y="140" text-anchor="middle" fill="white" font-size="28" font-weight="700">INPUT</text>
  <text x="110" y="175" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="18">พิมพ์ กด สแกน อัปโหลด</text>
  <text x="110" y="200" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="16">📥 รับข้อมูลเข้า</text>
  <!-- Arrow 1 -->
  <line x1="215" y1="150" x2="265" y2="150" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- Process -->
  <rect x="270" y="80" width="200" height="140" rx="16" fill="url(#gProcess)" opacity="0.9"/>
  <text x="370" y="140" text-anchor="middle" fill="white" font-size="28" font-weight="700">PROCESS</text>
  <text x="370" y="175" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="18">คำนวณ ตรวจสอบ จัดการ</text>
  <text x="370" y="200" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="16">⚙️ ประมวลผล</text>
  <!-- Arrow 2 -->
  <line x1="475" y1="150" x2="525" y2="150" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- Output -->
  <rect x="530" y="80" width="200" height="140" rx="16" fill="url(#gOutput)" opacity="0.9"/>
  <text x="630" y="140" text-anchor="middle" fill="white" font-size="28" font-weight="700">OUTPUT</text>
  <text x="630" y="175" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="18">แจ้งเตือน รายงาน ผล</text>
  <text x="630" y="200" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="16">📤 แสดงผลลัพธ์</text>
  <!-- Arrow 3 -->
  <line x1="735" y1="150" x2="785" y2="150" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- Storage -->
  <rect x="790" y="80" width="200" height="140" rx="16" fill="url(#gStorage)" opacity="0.9"/>
  <text x="890" y="140" text-anchor="middle" fill="white" font-size="28" font-weight="700">STORAGE</text>
  <text x="890" y="175" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="18">บันทึก เก็บ สำรอง</text>
  <text x="890" y="200" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="16">💾 จัดเก็บข้อมูล</text>
</svg>
