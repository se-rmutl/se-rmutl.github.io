<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" opacity="0.12">
  <style>
    line { stroke: #38BDF8; stroke-width: 1.5; }
    circle { fill: #38BDF8; }
  </style>
  <!-- Circuit lines pattern -->
  <line x1="0" y1="200" x2="300" y2="200"/>
  <line x1="300" y1="200" x2="300" y2="400"/>
  <line x1="300" y1="400" x2="600" y2="400"/>
  <line x1="600" y1="300" x2="600" y2="700"/>
  <line x1="600" y1="300" x2="900" y2="300"/>
  <line x1="900" y1="100" x2="900" y2="500"/>
  <line x1="900" y1="100" x2="1200" y2="100"/>
  <line x1="1200" y1="0" x2="1200" y2="300"/>
  <line x1="1200" y1="300" x2="1500" y2="300"/>
  <line x1="1500" y1="200" x2="1500" y2="600"/>
  <line x1="1500" y1="200" x2="1920" y2="200"/>
  <line x1="0" y1="600" x2="400" y2="600"/>
  <line x1="400" y1="500" x2="400" y2="800"/>
  <line x1="400" y1="800" x2="700" y2="800"/>
  <line x1="700" y1="600" x2="700" y2="900"/>
  <line x1="700" y1="900" x2="1000" y2="900"/>
  <line x1="1000" y1="700" x2="1000" y2="1080"/>
  <line x1="1300" y1="500" x2="1300" y2="800"/>
  <line x1="1300" y1="500" x2="1920" y2="500"/>
  <line x1="1600" y1="400" x2="1600" y2="700"/>
  <line x1="1600" y1="700" x2="1920" y2="700"/>
  <!-- Nodes -->
  <circle cx="300" cy="200" r="5"/>
  <circle cx="300" cy="400" r="5"/>
  <circle cx="600" cy="400" r="5"/>
  <circle cx="600" cy="300" r="5"/>
  <circle cx="900" cy="300" r="5"/>
  <circle cx="900" cy="100" r="5"/>
  <circle cx="1200" cy="100" r="5"/>
  <circle cx="1200" cy="300" r="5"/>
  <circle cx="1500" cy="300" r="5"/>
  <circle cx="1500" cy="200" r="5"/>
  <circle cx="400" cy="600" r="5"/>
  <circle cx="400" cy="800" r="5"/>
  <circle cx="700" cy="800" r="5"/>
  <circle cx="700" cy="900" r="5"/>
  <circle cx="1000" cy="900" r="5"/>
  <circle cx="1300" cy="500" r="5"/>
  <circle cx="1600" cy="700" r="5"/>
  <!-- Resistors / components -->
  <rect x="580" y="680" width="40" height="20" rx="3" fill="none" stroke="#38BDF8" stroke-width="2"/>
  <rect x="880" y="480" width="40" height="20" rx="3" fill="none" stroke="#38BDF8" stroke-width="2"/>
  <rect x="1280" y="780" width="40" height="20" rx="3" fill="none" stroke="#38BDF8" stroke-width="2"/>
  <!-- Chips -->
  <rect x="250" y="370" width="50" height="30" rx="3" fill="#0A1628" stroke="#38BDF8" stroke-width="1.5"/>
  <rect x="850" y="270" width="50" height="30" rx="3" fill="#0A1628" stroke="#38BDF8" stroke-width="1.5"/>
  <rect x="1450" y="270" width="50" height="30" rx="3" fill="#0A1628" stroke="#38BDF8" stroke-width="1.5"/>
</svg>
