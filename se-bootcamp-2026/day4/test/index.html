<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Technology Landscape Exam 2569</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0fdfa; }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .option-btn { transition: all 0.2s ease; }
        .option-btn:hover { border-color: #0d9488; background-color: #f0fdfa; }
        .option-btn.selected { border-color: #0d9488; background-color: #ccfbf1; border-width: 2px; }
        
        #capture-area { background-image: url('data:image/svg+xml,%3Csvg width=\"60\" height=\"60\" viewBox=\"0 0 60 60\" xmlns=\"http://www.w3.org/2000/svg\"%3E%3Cg fill=\"none\" fill-rule=\"evenodd\"%3E%3Cg fill=\"%2314b8a6\" fill-opacity=\"0.05\"%3E%3Cpath d=\"M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E'); }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex items-center justify-center p-4">

    <!-- App Container -->
    <div id="app" class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden relative min-h-[600px] flex flex-col">
        
        <!-- Header -->
        <div class="bg-teal-600 p-6 text-white text-center rounded-b-[2rem] shadow-md z-10 relative">
            <h1 class="text-2xl font-bold">Web Tech Exam</h1>
            <p class="text-teal-100 text-sm mt-1">วศ.บ. วิศวกรรมซอฟต์แวร์ มทร.ล้านนา 2569</p>
        </div>

        <!-- Section 1: Registration -->
        <div id="registration-sec" class="p-6 flex-grow flex flex-col justify-center slide-up">
            <div class="text-center mb-6">
                <div class="inline-block p-4 bg-teal-50 rounded-full text-teal-500 mb-4">
                    <i class="fas fa-user-graduate text-4xl"></i>
                </div>
                <h2 class="text-xl font-bold">ลงทะเบียนเข้าสอบ</h2>
                <p class="text-sm text-slate-500 mt-1">กรุณากรอกข้อมูลให้ครบถ้วน</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">ชื่อ-นามสกุล</label>
                    <input type="text" id="student-name" placeholder="ระบุ ชื่อ-นามสกุล" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-teal-500 bg-slate-50">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">ห้องเรียน</label>
                    <select id="student-room" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-teal-500 bg-slate-50 text-slate-700">
                        <option value="">-- เลือกห้องเรียน --</option>
                        <option value="ก.">ห้อง ก.</option>
                        <option value="ข.">ห้อง ข.</option>
                    </select>
                </div>
                <button onclick="startQuiz()" class="w-full bg-teal-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-teal-200 hover:bg-teal-700 transition mt-4">
                    เริ่มทำข้อสอบ <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </div>
        </div>

        <!-- Section 2: Quiz -->
        <div id="quiz-sec" class="hidden flex-grow flex-col relative">
            <div class="p-4 flex justify-between items-center bg-slate-50 border-b border-slate-100">
                <span class="text-sm font-semibold text-slate-500" id="q-counter">ข้อ 1 / 20</span>
                <div class="w-1/2 bg-slate-200 rounded-full h-2">
                    <div id="progress-bar" class="bg-teal-500 h-2 rounded-full transition-all duration-300" style="width: 5%"></div>
                </div>
            </div>

            <div class="p-6 flex-grow flex flex-col slide-up" id="q-container">
                <!-- Question renders here -->
            </div>

            <div class="p-4 border-t border-slate-100 flex gap-3 bg-white">
                <button id="btn-prev" onclick="prevQ()" class="flex-1 py-3 border border-slate-200 rounded-xl font-semibold text-slate-600 hover:bg-slate-50 disabled:opacity-50 hidden">ย้อนกลับ</button>
                <button id="btn-next" onclick="nextQ()" class="flex-1 py-3 bg-teal-600 text-white rounded-xl font-semibold shadow-md hover:bg-teal-700 disabled:opacity-50">ถัดไป</button>
                <button id="btn-submit" onclick="submitQuiz()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-semibold shadow-md hover:bg-indigo-700 hidden">ส่งข้อสอบ</button>
            </div>
        </div>

        <!-- Section 3: Result -->
        <div id="result-sec" class="hidden flex-grow flex-col slide-up">
            <div id="capture-area" class="p-6 flex-grow flex flex-col items-center justify-center text-center bg-white rounded-3xl m-2 border border-slate-100 shadow-sm relative">
                <!-- Infographic Ribbon -->
                <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-teal-400 via-indigo-500 to-purple-500 rounded-t-3xl"></div>
                
                <div id="result-icon" class="mb-4"></div>
                <h2 id="result-title" class="text-2xl font-bold mb-2">ผลการสอบ</h2>
                <div class="bg-slate-50 px-6 py-4 rounded-2xl w-full mb-6 border border-slate-100">
                    <div class="text-slate-500 text-sm mb-1">คะแนนของคุณ</div>
                    <div class="text-5xl font-black text-slate-800 mb-2"><span id="score-display">0</span><span class="text-2xl text-slate-400">/20</span></div>
                    <div id="result-status" class="font-bold"></div>
                </div>
                
                <div class="w-full text-left bg-slate-50 p-4 rounded-xl text-sm text-slate-600 border border-slate-100">
                    <p class="mb-1"><i class="fas fa-user text-teal-500 w-5"></i> <span id="res-name" class="font-semibold text-slate-800"></span></p>
                    <p class="mb-1"><i class="fas fa-door-open text-teal-500 w-5"></i> ห้อง <span id="res-room" class="font-semibold text-slate-800"></span></p>
                    <p><i class="fas fa-clock text-teal-500 w-5"></i> <span id="res-date"></span></p>
                </div>
            </div>
            
            <div class="p-4" id="result-actions">
                <!-- Buttons render here -->
            </div>
        </div>

    </div>

<script>
    const quizDataRaw = [{"q": "ข้อใดอธิบายความหมายของ Frontend ได้ถูกต้องที่สุด?", "options": ["ส่วนที่ผู้ใช้มองเห็นและโต้ตอบผ่าน Browser", "ส่วนที่ใช้เก็บข้อมูลทั้งหมดของระบบ (Database)", "ส่วนประมวลผลเบื้องหลัง (Business Logic)", "ระบบความปลอดภัยของเซิร์ฟเวอร์"], "ans": 0}, {"q": "Backend มีหน้าที่หลักในระบบ Web Application อย่างไร?", "options": ["แสดงผลหน้าเว็บให้สวยงามด้วย CSS", "ประมวลผล Logic, ตรวจสิทธิ์ และจัดการข้อมูลเบื้องหลัง", "แสดงผลข้อมูลให้เหมาะสมกับหน้าจอหลายขนาด", "เป็นโปรแกรมเบราว์เซอร์ที่ผู้ใช้ใช้เข้าเว็บ"], "ans": 1}, {"q": "API (Application Programming Interface) ใช้ทำอะไรในระบบเว็บ?", "options": ["ใช้จัดเก็บข้อมูลถาวรแทน Database", "เป็นช่องทางให้ Frontend คุยและแลกเปลี่ยนข้อมูลกับ Backend", "ใช้เข้ารหัสพาสเวิร์ดของผู้ใช้งาน", "ใช้กำหนดโครงสร้างเนื้อหาบนหน้าเว็บ"], "ans": 1}, {"q": "ภาษาใดเป็นโครงสร้างพื้นฐานสำคัญที่สุดในการสร้างเนื้อหาบนหน้าเว็บ (Frontend)?", "options": ["Python, Java, C#", "SQL, MongoDB, Redis", "HTML, CSS, JavaScript", "PHP, Laravel, Go"], "ans": 2}, {"q": "ข้อใดจัดเป็นระบบฐานข้อมูล (Database) แบบ Relational ที่มีโครงสร้างชัดเจน?", "options": ["PostgreSQL", "MongoDB", "React", "HTML"], "ans": 0}, {"q": "Responsive Design หมายถึงอะไรในบริบทของการพัฒนาเว็บ?", "options": ["การพัฒนาเว็บให้ไม่มีบั๊กเลย 100%", "เว็บที่ปรับขนาดและ Layout ให้เหมาะสมกับหน้าจออุปกรณ์ต่างๆ (เช่น มือถือ, แท็บเล็ต)", "การทำเว็บให้โหลดข้อมูลจากเซิร์ฟเวอร์ด้วยความเร็วสูงมาก", "เว็บที่ไม่ต้องใช้ฐานข้อมูลในการทำงาน"], "ans": 1}, {"q": "สิ่งใดต่อไปนี้ ไม่ควร ใส่ไว้ในโค้ด JavaScript ฝั่ง Frontend แบบเปิดเผยเด็ดขาด?", "options": ["ชื่อคลาส CSS (Class Name)", "ข้อความหรือ Text ที่แสดงผลบนหน้าจอ", "ความกว้างและความสูงของปุ่ม", "API Key ลับหรือ Password สำหรับเข้าถึงฐานข้อมูล"], "ans": 3}, {"q": "REST API มักใช้ HTTP Method ใดสำหรับการ 'อ่านข้อมูล' (Read)?", "options": ["GET", "POST", "DELETE", "PATCH"], "ans": 0}, {"q": "ปัจจัยใดต่อไปนี้ที่มีผลทำให้เว็บโหลด 'ช้า' และส่งผลเสียต่อ Performance?", "options": ["ใช้รูปภาพขนาดใหญ่และมีความละเอียดสูงเกินจำเป็น", "ใช้ไฟล์ JavaScript และ CSS จำนวนมาก", "Server ตอบสนองช้า", "ถูกทุกข้อ"], "ans": 3}, {"q": "เหตุใดนักศึกษาวิศวกรรมซอฟต์แวร์จึงต้องเข้าใจภาพรวมของ Web Technology Landscape?", "options": ["เพื่อหลีกเลี่ยงการเขียนโปรแกรมในอนาคต", "เพื่อให้จำชื่อ Framework ใหม่ๆ ได้ครบทุกตัวในโลก", "เพื่อเห็นภาพว่าระบบทั้งหมดทำงานร่วมกันอย่างไร ตั้งแต่ผู้ใช้ไปจนถึง Database", "เพื่อจะได้ไม่ต้องเรียนวิชา Computer Network"], "ans": 2}, {"q": "จาก URL: https://example.com/courses?page=1 ส่วนใดคือ Domain?", "options": ["https://", "example.com", "/courses", "?page=1"], "ans": 1}, {"q": "เว็บไซต์ที่มีการให้ผู้ใช้กรอกข้อมูลส่วนตัวหรือรหัสผ่าน ควรใช้ Protocol ใดเป็นมาตรฐานเพื่อความปลอดภัย?", "options": ["HTTP", "FTP", "HTTPS", "WebSocket"], "ans": 2}, {"q": "ภาษาใดทำหน้าที่กำหนดรูปลักษณ์ ความสวยงาม สีสัน และการจัดวาง (Layout) บนหน้าเว็บ?", "options": ["HTML", "CSS", "JavaScript", "SQL"], "ans": 1}, {"q": "เครื่องมือใดต่อไปนี้ จัดอยู่ในกลุ่ม Frontend Framework / Library?", "options": ["Django, FastAPI", "PostgreSQL, MySQL", "React, Vue, Angular", "Docker, Vercel"], "ans": 2}, {"q": "แนวคิด Component ในการพัฒนา Frontend หมายถึงอะไร?", "options": ["การเขียนโค้ดทั้งหมดไว้ในไฟล์ HTML ไฟล์เดียว", "การนำชิ้นส่วน UI เช่น ปุ่ม หรือ การ์ด มาสร้างแยกไว้เพื่อนำกลับมาใช้ซ้ำ", "การป้องกันไม่ให้ใครสามารถเข้าถึงซอร์สโค้ดได้", "การเก็บข้อมูลผู้ใช้ลงใน Component ฐานข้อมูล"], "ans": 1}, {"q": "ข้อใดเป็น Database แบบ NoSQL (Document/Key-Value) ที่เน้นความยืดหยุ่น?", "options": ["MySQL", "SQL Server", "PostgreSQL", "MongoDB"], "ans": 3}, {"q": "การทำงานแบบ Single Page Application (SPA) คืออะไร?", "options": ["เว็บที่มีเนื้อหาเพียงหน้าเดียวและไม่มีลิงก์ใดๆ เลย", "การโหลดหน้าเว็บหลักครั้งแรก แล้วใช้ JavaScript จัดการการเปลี่ยนหน้าภายใน Browser", "เว็บที่ Server ต้องสร้าง HTML ส่งมาให้ใหม่ทุกครั้งที่มีการกดลิงก์", "การสร้างเว็บเพื่อใช้งานกับหน้าจอเดียวขนาดใหญ่"], "ans": 1}, {"q": "Web Accessibility (a11y) ให้ความสำคัญกับเรื่องใดมากที่สุด?", "options": ["การทำเว็บให้มีความเร็วในการดาวน์โหลดสูงสุด", "การใช้สีสันที่ฉูดฉาดดึงดูดวัยรุ่น", "การทำให้คนหลากหลายกลุ่มเข้าถึงเว็บได้ รวมถึงคนสายตาไม่ดีหรือต้องใช้ Screen Reader", "การทำให้เว็บไม่สามารถถูกแฮ็กได้ 100%"], "ans": 2}, {"q": "ข้อใดคือเครื่องมือ Version Control ที่มีความสำคัญมากสำหรับการพัฒนาซอฟต์แวร์เป็นทีม?", "options": ["VS Code", "Git และ GitHub", "Figma", "Postman"], "ans": 1}, {"q": "เมื่อผู้ใช้กดพิมพ์ URL และกด Enter สิ่งแรกสุดที่ Browser ดำเนินการคืออะไร?", "options": ["ดาวน์โหลดรูปภาพมาแสดงทันที", "รันโค้ด JavaScript ที่อยู่ในเครื่อง", "ตรวจสอบ URL ค้นหา IP Address (DNS) และส่ง Request ผ่าน Internet", "เชื่อมต่อตรงไปยังฐานข้อมูล (Database) ของเว็บไซต์นั้น"], "ans": 2}];
    
    let currentQuiz = [];
    let currentIdx = 0;
    let userAnswers = [];
    let userInfo = { name: '', room: '' };

    function shuffleOptions(questionObj) {
        let optionsWithIndex = questionObj.options.map((opt, i) => ({ text: opt, isCorrect: i === questionObj.ans }));
        // Shuffle options
        for (let i = optionsWithIndex.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [optionsWithIndex[i], optionsWithIndex[j]] = [optionsWithIndex[j], optionsWithIndex[i]];
        }
        return {
            q: questionObj.q,
            options: optionsWithIndex.map(o => o.text),
            ans: optionsWithIndex.findIndex(o => o.isCorrect)
        };
    }

    function initQuizData() {
        // Deep copy and shuffle questions
        let qs = JSON.parse(JSON.stringify(quizDataRaw));
        for (let i = qs.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [qs[i], qs[j]] = [qs[j], qs[i]];
        }
        // Shuffle options inside each question
        currentQuiz = qs.map(q => shuffleOptions(q));
        userAnswers = new Array(20).fill(null);
        currentIdx = 0;
    }

    function startQuiz() {
        const nameInput = document.getElementById('student-name').value.trim();
        const roomInput = document.getElementById('student-room').value;
        if(!nameInput || !roomInput) {
            alert('กรุณากรอกชื่อและเลือกห้องเรียนให้ครบถ้วน');
            return;
        }
        userInfo.name = nameInput;
        userInfo.room = roomInput;
        
        initQuizData();
        
        document.getElementById('registration-sec').classList.add('hidden');
        document.getElementById('quiz-sec').classList.remove('hidden');
        document.getElementById('quiz-sec').classList.add('flex');
        
        renderQuestion();
    }

    function renderQuestion() {
        const qData = currentQuiz[currentIdx];
        const container = document.getElementById('q-container');
        
        // Infographic / Decorative Icon based on question index to make it not boring
        const icons = ['fa-laptop-code', 'fa-server', 'fa-database', 'fa-cloud', 'fa-network-wired', 'fa-mobile-screen', 'fa-shield-halved', 'fa-code-branch'];
        const currentIcon = icons[currentIdx % icons.length];

        let html = `
            <div class="mb-6 flex gap-4 items-start">
                <div class="shrink-0 w-12 h-12 bg-teal-100 text-teal-600 rounded-2xl flex items-center justify-center text-xl shadow-inner">
                    <i class="fas ${currentIcon}"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-800 leading-snug">${qData.q}</h3>
            </div>
            <div class="space-y-3 flex-grow">
        `;
        
        qData.options.forEach((opt, idx) => {
            const isSelected = userAnswers[currentIdx] === idx;
            html += `
                <div onclick="selectOption(${idx})" class="option-btn p-4 border rounded-xl cursor-pointer flex items-center gap-3 ${isSelected ? 'selected' : 'border-slate-200'}">
                    <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center shrink-0 ${isSelected ? 'border-teal-500 bg-teal-500' : 'border-slate-300'}">
                        ${isSelected ? '<div class="w-2.5 h-2.5 bg-white rounded-full"></div>' : ''}
                    </div>
                    <span class="text-sm font-medium ${isSelected ? 'text-teal-800' : 'text-slate-600'}">${opt}</span>
                </div>
            `;
        });
        
        html += `</div>`;
        container.innerHTML = html;
        
        // Re-trigger animation
        container.classList.remove('slide-up');
        void container.offsetWidth; // trigger reflow
        container.classList.add('slide-up');

        // Update UI
        document.getElementById('q-counter').innerText = `ข้อ ${currentIdx + 1} / 20`;
        document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / 20) * 100}%`;
        
        document.getElementById('btn-prev').classList.toggle('hidden', currentIdx === 0);
        
        const btnNext = document.getElementById('btn-next');
        const btnSubmit = document.getElementById('btn-submit');
        
        if(currentIdx === 19) {
            btnNext.classList.add('hidden');
            btnSubmit.classList.remove('hidden');
        } else {
            btnNext.classList.remove('hidden');
            btnSubmit.classList.add('hidden');
        }

        checkAnswered();
    }

    function selectOption(idx) {
        userAnswers[currentIdx] = idx;
        renderQuestion();
    }

    function checkAnswered() {
        const hasAnswered = userAnswers[currentIdx] !== null;
        document.getElementById('btn-next').disabled = !hasAnswered;
        document.getElementById('btn-submit').disabled = !hasAnswered;
    }

    function nextQ() {
        if(currentIdx < 19) {
            currentIdx++;
            renderQuestion();
        }
    }

    function prevQ() {
        if(currentIdx > 0) {
            currentIdx--;
            renderQuestion();
        }
    }

    function submitQuiz() {
        // Calculate Score
        let score = 0;
        currentQuiz.forEach((q, i) => {
            if(userAnswers[i] === q.ans) score++;
        });
        
        showResult(score);
    }

    function showResult(score) {
        document.getElementById('quiz-sec').classList.remove('flex');
        document.getElementById('quiz-sec').classList.add('hidden');
        document.getElementById('result-sec').classList.remove('hidden');
        document.getElementById('result-sec').classList.add('flex');
        
        document.getElementById('score-display').innerText = score;
        document.getElementById('res-name').innerText = userInfo.name;
        document.getElementById('res-room').innerText = userInfo.room;
        
        const dateStr = new Date().toLocaleString('th-TH', { dateStyle: 'medium', timeStyle: 'short' });
        document.getElementById('res-date').innerText = dateStr;
        
        const statusEl = document.getElementById('result-status');
        const iconEl = document.getElementById('result-icon');
        const actionsEl = document.getElementById('result-actions');
        
        if(score >= 15) {
            statusEl.innerText = "ผ่านเกณฑ์การทดสอบ";
            statusEl.className = "font-bold text-teal-600 text-lg";
            iconEl.innerHTML = '<div class="w-20 h-20 bg-teal-100 text-teal-500 rounded-full flex items-center justify-center text-4xl mx-auto shadow-inner"><i class="fas fa-check-circle"></i></div>';
            
            actionsEl.innerHTML = `
                <button onclick="captureScreen()" class="w-full py-4 bg-teal-600 text-white rounded-xl font-bold shadow-lg hover:bg-teal-700 flex justify-center items-center gap-2">
                    <i class="fas fa-camera"></i> บันทึกผลสอบเป็นรูปภาพ (PNG)
                </button>
                <p class="text-xs text-center text-slate-400 mt-3">นำรูปภาพนี้ส่งให้อาจารย์ผู้สอนเพื่อเก็บคะแนน</p>
            `;
        } else {
            statusEl.innerText = "ไม่ผ่านเกณฑ์ (ต้องได้ 15 คะแนนขึ้นไป)";
            statusEl.className = "font-bold text-red-500 text-lg";
            iconEl.innerHTML = '<div class="w-20 h-20 bg-red-100 text-red-500 rounded-full flex items-center justify-center text-4xl mx-auto shadow-inner"><i class="fas fa-times-circle"></i></div>';
            
            actionsEl.innerHTML = `
                <button onclick="retryQuiz()" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold shadow-lg hover:bg-indigo-700 flex justify-center items-center gap-2">
                    <i class="fas fa-redo"></i> ทำข้อสอบใหม่อีกครั้ง
                </button>
                <p class="text-xs text-center text-slate-400 mt-3">ระบบจะทำการสุ่มข้อสอบใหม่ทั้งหมด</p>
            `;
        }
    }

    function retryQuiz() {
        document.getElementById('result-sec').classList.remove('flex');
        document.getElementById('result-sec').classList.add('hidden');
        
        initQuizData();
        
        document.getElementById('quiz-sec').classList.remove('hidden');
        document.getElementById('quiz-sec').classList.add('flex');
        renderQuestion();
    }

    function captureScreen() {
        const target = document.getElementById('capture-area');
        
        html2canvas(target, {
            scale: 2,
            backgroundColor: '#ffffff',
            useCORS: true
        }).then(canvas => {
            let link = document.createElement('a');
            link.download = `Result_${userInfo.name.replace(/\s+/g, '_')}_${userInfo.room}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
</script>
</body>
</html>
