<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 420" role="img" aria-label="Git workflow diagram">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#072c5b"/><stop offset="1" stop-color="#1a609e"/></linearGradient><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#00152f" flood-opacity=".35"/></filter></defs>
  <rect width="1100" height="420" rx="36" fill="url(#bg)"/>
  <path d="M132 216H960" stroke="#a9d5ff" stroke-width="8" stroke-linecap="round" opacity=".6"/>
  <g font-family="Arial" text-anchor="middle" filter="url(#s)">
    <g transform="translate(120 216)"><circle r="60" fill="#fff"/><text y="7" font-size="23" font-weight="800" fill="#062d5b">main</text><text y="94" font-size="17" fill="#fff">start</text></g>
    <g transform="translate(320 216)"><circle r="60" fill="#ffcf37"/><text y="7" font-size="20" font-weight="800" fill="#062d5b">feature</text><text y="94" font-size="17" fill="#fff">develop</text></g>
    <g transform="translate(540 216)"><circle r="60" fill="#73e4c4"/><text y="7" font-size="20" font-weight="800" fill="#062d5b">commit</text><text y="94" font-size="17" fill="#fff">record</text></g>
    <g transform="translate(760 216)"><circle r="60" fill="#d0b6ff"/><text y="7" font-size="22" font-weight="800" fill="#062d5b">PR</text><text y="94" font-size="17" fill="#fff">review</text></g>
    <g transform="translate(980 216)"><circle r="60" fill="#f09797"/><text y="7" font-size="20" font-weight="800" fill="#062d5b">merge</text><text y="94" font-size="17" fill="#fff">deploy</text></g>
  </g>
  <g fill="#fff"><path d="M232 216l-20-15v30z"/><path d="M452 216l-20-15v30z"/><path d="M672 216l-20-15v30z"/><path d="M892 216l-20-15v30z"/></g>
  <text x="550" y="70" text-anchor="middle" font-family="Arial" font-size="32" font-weight="800" fill="#fff">Git workflow: make progress visible and reviewable</text>
  <text x="550" y="360" text-anchor="middle" font-family="Arial" font-size="20" fill="#dbeeff">Meaningful commits + pull request = evidence of development</text>
</svg>
