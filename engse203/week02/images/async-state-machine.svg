<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-label="Async await state machine">
  <defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#eef7ff"/><stop offset="1" stop-color="#ecfeff"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity=".16"/></filter><marker id="a" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto"><path d="M2,2 L12,7 L2,12 Z" fill="#2563eb"/></marker></defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <text x="62" y="78" font-family="Inter,Noto Sans Thai,sans-serif" font-size="46" font-weight="800" fill="#0b2a5f">Async/Await: สถานะที่ UI ต้องสื่อสารกับผู้ใช้</text>
  <text x="64" y="122" font-family="Inter,Noto Sans Thai,sans-serif" font-size="24" fill="#385270">ทุกคำขอข้อมูลมีโอกาสสำเร็จ ช้า หรือผิดพลาด โปรแกรมจึงต้องออกแบบ State ให้ครบ</text>
  <g filter="url(#s)"><rect x="70" y="230" width="220" height="155" rx="24" fill="#fff"/><text x="105" y="285" font-size="32" font-family="Inter,Noto Sans Thai" font-weight="800" fill="#1d4ed8">Loading</text><text x="105" y="332" font-size="22" font-family="Inter,Noto Sans Thai" fill="#475569">กำลังร้องขอข้อมูล</text></g>
  <g filter="url(#s)"><rect x="490" y="150" width="220" height="155" rx="24" fill="#fff"/><text x="528" y="205" font-size="32" font-family="Inter,Noto Sans Thai" font-weight="800" fill="#15803d">Success</text><text x="528" y="252" font-size="22" font-family="Inter,Noto Sans Thai" fill="#475569">response.ok = true</text></g>
  <g filter="url(#s)"><rect x="490" y="410" width="220" height="155" rx="24" fill="#fff"/><text x="528" y="465" font-size="32" font-family="Inter,Noto Sans Thai" font-weight="800" fill="#b91c1c">Error</text><text x="528" y="512" font-size="22" font-family="Inter,Noto Sans Thai" fill="#475569">throw / catch</text></g>
  <g filter="url(#s)"><rect x="890" y="280" width="240" height="155" rx="24" fill="#fff"/><text x="928" y="335" font-size="32" font-family="Inter,Noto Sans Thai" font-weight="800" fill="#7c3aed">Finally</text><text x="928" y="382" font-size="22" font-family="Inter,Noto Sans Thai" fill="#475569">คืนสถานะปุ่ม / log</text></g>
  <path d="M300 290 C390 240 410 220 480 215" stroke="#2563eb" stroke-width="7" fill="none" marker-end="url(#a)"/>
  <text x="342" y="225" font-size="24" font-family="Inter,Noto Sans Thai" fill="#2563eb" font-weight="700">await fetch()</text>
  <path d="M300 340 C390 410 410 480 480 490" stroke="#ef4444" stroke-width="7" fill="none" marker-end="url(#a)"/>
  <text x="330" y="452" font-size="24" font-family="Inter,Noto Sans Thai" fill="#b91c1c" font-weight="700">network/404/500</text>
  <path d="M720 230 C810 250 830 310 880 332" stroke="#7c3aed" stroke-width="7" fill="none" marker-end="url(#a)"/>
  <path d="M720 495 C805 470 832 408 880 382" stroke="#7c3aed" stroke-width="7" fill="none" marker-end="url(#a)"/>
  <text x="80" y="625" font-size="27" font-family="Inter,Noto Sans Thai" fill="#0b2a5f" font-weight="700">จำให้ได้:</text><text x="205" y="625" font-size="27" font-family="Inter,Noto Sans Thai" fill="#385270">fetch ไม่ throw เมื่อ HTTP 404/500 ดังนั้นต้องตรวจ response.ok ด้วยตนเอง</text>
</svg>
