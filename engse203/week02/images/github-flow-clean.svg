  <path d="M255 298 L300 298" stroke="#2563eb" stroke-width="7" marker-end="url(#a)"/><path d="M535 298 L580 298" stroke="#2563eb" stroke-width="7" marker-end="url(#a)"/><path d="M765 298 L810 298" stroke="#2563eb" stroke-width="7" marker-end="url(#a)"/><path d="M995 298 L1005 298" stroke="#2563eb" stroke-width="7" marker-end="url(#a)"/>
  <g filter="url(#s)"><rect x="278" y="455" width="645" height="105" rx="26" fill="#0b2a5f"/><text x="320" y="503" font-family="monospace" font-size="25" font-weight="800" fill="#fff">npm run build → docs/ → Settings > Pages → main /docs</text><text x="320" y="535" font-family="Inter,Noto Sans Thai" font-size="22" fill="#bcd4ff">Pages URL: https://username.github.io/engse203-lab02-id/</text></g>
