    <rect x="310" y="230" width="220" height="135" rx="22" fill="#fff"/><text x="345" y="286" font-size="28" font-weight="800" fill="#0b2a5f">feature/...</text><text x="345" y="325" font-size="20" fill="#475569">พัฒนา LAB 2</text>
    <rect x="590" y="230" width="170" height="135" rx="22" fill="#fff"/><text x="625" y="286" font-size="28" font-weight="800" fill="#0b2a5f">commit</text><text x="625" y="325" font-size="20" fill="#475569">หลักฐานงาน</text>
    <rect x="820" y="230" width="170" height="135" rx="22" fill="#fff"/><text x="855" y="286" font-size="28" font-weight="800" fill="#0b2a5f">PR</text><text x="855" y="325" font-size="20" fill="#475569">ตรวจ/สรุป</text>
    <rect x="1010" y="230" width="130" height="135" rx="22" fill="#fff"/><text x="1040" y="286" font-size="28" font-weight="800" fill="#0b2a5f">merge</text><text x="1040" y="325" font-size="20" fill="#475569">กลับ main</text>
