<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-label="Vite pipeline infographic">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#eef7ff"/><stop offset="1" stop-color="#f7efff"/></linearGradient>
    <linearGradient id="vite" x1="0" x2="1"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#06b6d4"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#10234a" flood-opacity="0.18"/></filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto"><path d="M2,2 L14,8 L2,14 Z" fill="#2563eb"/></marker>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <text x="62" y="75" font-family="Inter, Noto Sans Thai, sans-serif" font-size="46" font-weight="800" fill="#0b2a5f">Vite: จากโค้ดระหว่างพัฒนา → เว็บไซต์พร้อม Deploy</text>
  <text x="64" y="120" font-family="Inter, Noto Sans Thai, sans-serif" font-size="24" fill="#385270">Dev Server เร็ว • HMR • Build • Bundle • Minify • GitHub Pages Path</text>
  <g filter="url(#shadow)">
    <rect x="65" y="180" width="250" height="315" rx="26" fill="#fff"/>
    <text x="98" y="230" font-family="Inter, Noto Sans Thai, sans-serif" font-size="28" font-weight="800" fill="#0b2a5f">Source Code</text>
    <text x="98" y="278" font-family="monospace" font-size="22" fill="#475569">src/main.js</text>
    <text x="98" y="318" font-family="monospace" font-size="22" fill="#475569">src/api.js</text>
    <text x="98" y="358" font-family="monospace" font-size="22" fill="#475569">src/ui.js</text>
    <text x="98" y="398" font-family="monospace" font-size="22" fill="#475569">style.css</text>
    <text x="98" y="438" font-family="monospace" font-size="22" fill="#475569">data/*.json</text>
  </g>
  <path d="M335 335 C390 335 405 335 455 335" stroke="#2563eb" stroke-width="8" fill="none" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="475" y="160" width="250" height="150" rx="26" fill="#fff"/>
    <rect x="515" y="198" width="70" height="70" rx="18" fill="url(#vite)"/>
    <text x="612" y="228" font-family="Inter, Noto Sans Thai, sans-serif" font-size="28" font-weight="800" fill="#0b2a5f">Dev</text>
    <text x="612" y="263" font-family="Inter, Noto Sans Thai, sans-serif" font-size="22" fill="#475569">npm run dev</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="475" y="375" width="250" height="150" rx="26" fill="#fff"/>
    <rect x="515" y="413" width="70" height="70" rx="18" fill="url(#vite)" opacity=".85"/>
    <text x="612" y="443" font-family="Inter, Noto Sans Thai, sans-serif" font-size="28" font-weight="800" fill="#0b2a5f">Build</text>
    <text x="612" y="478" font-family="Inter, Noto Sans Thai, sans-serif" font-size="22" fill="#475569">npm run build</text>
  </g>
  <path d="M745 235 C790 235 800 235 835 235" stroke="#2563eb" stroke-width="8" fill="none" marker-end="url(#arrow)"/>
  <path d="M745 450 C790 450 800 450 835 450" stroke="#2563eb" stroke-width="8" fill="none" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="855" y="155" width="270" height="160" rx="26" fill="#fff"/>
    <text x="890" y="208" font-family="Inter, Noto Sans Thai, sans-serif" font-size="30" font-weight="800" fill="#0b2a5f">localhost:5173</text>
    <text x="890" y="252" font-family="Inter, Noto Sans Thai, sans-serif" font-size="23" fill="#475569">เห็นผลทันทีเมื่อ Save</text>
    <text x="890" y="285" font-family="Inter, Noto Sans Thai, sans-serif" font-size="22" fill="#7c3aed" font-weight="700">HMR / Fast Feedback</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="855" y="370" width="270" height="160" rx="26" fill="#fff"/>
    <text x="890" y="423" font-family="Inter, Noto Sans Thai, sans-serif" font-size="30" font-weight="800" fill="#0b2a5f">docs/</text>
    <text x="890" y="467" font-family="Inter, Noto Sans Thai, sans-serif" font-size="23" fill="#475569">ไฟล์เล็ก โหลดเร็ว</text>
    <text x="890" y="500" font-family="Inter, Noto Sans Thai, sans-serif" font-size="22" fill="#7c3aed" font-weight="700">พร้อม GitHub Pages</text>
  </g>
  <path d="M600 312 L600 366" stroke="#7c3aed" stroke-width="6" stroke-dasharray="14 12"/>
  <text x="80" y="608" font-family="Inter, Noto Sans Thai, sans-serif" font-size="26" font-weight="700" fill="#0b2a5f">Key idea:</text>
  <text x="205" y="608" font-family="Inter, Noto Sans Thai, sans-serif" font-size="26" fill="#385270">Vite ไม่ได้เปลี่ยนภาษา JavaScript แต่ช่วยให้ workflow พัฒนา ทดสอบ และส่งมอบเป็นมาตรฐานอุตสาหกรรม</text>
</svg>
