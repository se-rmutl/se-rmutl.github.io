<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ES Modules architecture for ENGSE203 Learning Dashboard</title>
  <desc id="desc">A clean module architecture showing main.js, api.js, utils.js, and ui.js with clear non-overlapping data flow connectors.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#e8f2ff"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop stop-color="#265fc8"/>
      <stop offset="1" stop-color="#347ce5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#17365d" flood-opacity=".15"/>
    </filter>
    <marker id="arrowBlue" markerWidth="16" markerHeight="16" refX="14" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#2c70d8"/>
    </marker>
    <marker id="arrowPurple" markerWidth="16" markerHeight="16" refX="14" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="1600" height="900" rx="38" fill="url(#bg)"/>
  <rect x="44" y="42" width="1512" height="816" rx="30" fill="none" stroke="#c9dcfb" stroke-width="2"/>

  <text x="92" y="108" font-family="system-ui, 'Noto Sans Thai', Tahoma, sans-serif" font-size="48" font-weight="800" fill="#0b2f67">ES Modules: แยกหน้าที่ของแต่ละไฟล์</text>
  <text x="92" y="156" font-family="system-ui, 'Noto Sans Thai', Tahoma, sans-serif" font-size="24" fill="#4c6388">main.js เชื่อมลำดับการทำงาน • api.js โหลดข้อมูล • utils.js ประมวลผล • ui.js แสดงผล</text>

  <g font-family="system-ui, 'Noto Sans Thai', Tahoma, sans-serif">
    <rect x="92" y="220" width="250" height="42" rx="21" fill="#e8f1ff" stroke="#bfd5fb"/>
    <text x="217" y="248" text-anchor="middle" font-size="18" font-weight="800" fill="#1e5db9">DATA FLOW →</text>
  </g>

  <!-- Connectors stay in the gaps between cards, leaving a visible safety margin. -->
  <g fill="none" stroke="url(#line)" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowBlue)">
    <path d="M385 470 L445 470"/>
    <path d="M770 470 L830 470"/>
    <path d="M1155 470 L1215 470"/>
  </g>
  <g font-family="system-ui, 'Noto Sans Thai', Tahoma, sans-serif" font-size="18" font-weight="700" fill="#33609c">
    <text x="415" y="438" text-anchor="middle">load</text>
    <text x="800" y="438" text-anchor="middle">tasks[]</text>
    <text x="1185" y="438" text-anchor="middle">render</text>
  </g>

  <!-- Feedback route is intentionally below all cards so it never crosses content. -->
  <path d="M1345 628 C1345 746 240 746 240 628" fill="none" stroke="#7c3aed" stroke-width="7" stroke-linecap="round" stroke-dasharray="13 12" marker-end="url(#arrowPurple)"/>
  <text x="800" y="774" text-anchor="middle" font-family="system-ui, 'Noto Sans Thai', Tahoma, sans-serif" font-size="20" font-weight="800" fill="#7046d9">events / state update กลับไปที่ main.js</text>

  <!-- Cards -->
  <g filter="url(#shadow)">
    <rect x="92" y="330" width="280" height="270" rx="26" fill="#ffffff"/>
    <rect x="477" y="330" width="280" height="270" rx="26" fill="#ffffff"/>
    <rect x="862" y="330" width="280" height="270" rx="26" fill="#ffffff"/>
    <rect x="1247" y="330" width="280" height="270" rx="26" fill="#ffffff"/>
  </g>

  <g font-family="system-ui, 'Noto Sans Thai', Tahoma, sans-serif">
    <g>
      <rect x="118" y="356" width="102" height="34" rx="17" fill="#e7f0ff"/>
      <text x="169" y="379" text-anchor="middle" font-size="16" font-weight="800" fill="#1f5eb9">ENTRY</text>
      <text x="124" y="435" font-size="34" font-weight="800" fill="#0a2f67">main.js</text>
      <text x="124" y="485" font-size="24" fill="#4d6283">• state</text>
      <text x="124" y="525" font-size="24" fill="#4d6283">• events</text>
      <text x="124" y="565" font-size="24" fill="#4d6283">• orchestration</text>
    </g>
    <g>
      <rect x="503" y="356" width="94" height="34" rx="17" fill="#e6f9f5"/>
      <text x="550" y="379" text-anchor="middle" font-size="16" font-weight="800" fill="#0c8b79">DATA</text>
      <text x="509" y="435" font-size="34" font-weight="800" fill="#0a2f67">api.js</text>
      <text x="509" y="485" font-size="24" fill="#4d6283">• fetch</text>
      <text x="509" y="525" font-size="24" fill="#4d6283">• response.ok</text>
      <text x="509" y="565" font-size="24" fill="#4d6283">• JSON</text>
    </g>
    <g>
      <rect x="888" y="356" width="112" height="34" rx="17" fill="#fff5d9"/>
      <text x="944" y="379" text-anchor="middle" font-size="16" font-weight="800" fill="#a66a00">LOGIC</text>
      <text x="894" y="435" font-size="34" font-weight="800" fill="#0a2f67">utils.js</text>
      <text x="894" y="485" font-size="24" fill="#4d6283">• filter</text>
      <text x="894" y="525" font-size="24" fill="#4d6283">• stats</text>
      <text x="894" y="565" font-size="24" fill="#4d6283">• labels</text>
    </g>
    <g>
      <rect x="1273" y="356" width="82" height="34" rx="17" fill="#f1eaff"/>
      <text x="1314" y="379" text-anchor="middle" font-size="16" font-weight="800" fill="#7046d9">UI</text>
      <text x="1279" y="435" font-size="34" font-weight="800" fill="#0a2f67">ui.js</text>
      <text x="1279" y="485" font-size="24" fill="#4d6283">• render cards</text>
      <text x="1279" y="525" font-size="24" fill="#4d6283">• messages</text>
      <text x="1279" y="565" font-size="24" fill="#4d6283">• empty state</text>
    </g>
  </g>

  <rect x="510" y="805" width="580" height="54" rx="27" fill="#0a2f67"/>
  <text x="800" y="841" text-anchor="middle" font-family="system-ui, 'Noto Sans Thai', Tahoma, sans-serif" font-size="23" font-weight="800" fill="#ffffff">index.html → &lt;script type="module" src="/src/main.js"&gt;</text>
</svg>
