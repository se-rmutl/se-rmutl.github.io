<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">ES Modules architecture with main.js as orchestrator</title>
  <desc id="desc">A non-overlapping hub-and-spoke diagram. index.html loads main.js. main.js coordinates api.js, utils.js, and ui.js through clearly separated arrow lanes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#f9fbff"/>
      <stop offset="1" stop-color="#eaf3ff"/>
    </linearGradient>
    <linearGradient id="mainFill" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#edf4ff"/>
      <stop offset="1" stop-color="#dceaff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#17365d" flood-opacity=".14"/>
    </filter>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2766c9"/>
    </marker>
    <marker id="arrowTeal" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f9583"/>
    </marker>
    <marker id="arrowPurple" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7445d8"/>
    </marker>
    <style>
      .thai { font-family: system-ui, 'Noto Sans Thai', Tahoma, sans-serif; }
      .title { font-size: 48px; font-weight: 800; fill: #0b2f67; }
      .subtitle { font-size: 24px; fill: #4c6388; }
      .caps { font-size: 16px; font-weight: 800; }
      .name { font-size: 36px; font-weight: 800; fill: #0a2f67; }
      .body { font-size: 23px; fill: #4d6283; }
      .small { font-size: 18px; font-weight: 800; fill: #38609c; }
      .arrowLabel { font-size: 17px; font-weight: 800; }
    </style>
  </defs>

  <rect width="1600" height="920" rx="38" fill="url(#bg)"/>
  <rect x="44" y="40" width="1512" height="840" rx="30" fill="none" stroke="#c9dcfb" stroke-width="2"/>

  <text x="92" y="108" class="thai title">ES Modules: แยกหน้าที่ของแต่ละไฟล์</text>
  <text x="92" y="156" class="thai subtitle">ให้ main.js เป็นผู้ประสานงาน ส่วน api.js, utils.js และ ui.js รับผิดชอบงานเฉพาะด้าน</text>

  <g class="thai">
    <rect x="92" y="198" width="342" height="44" rx="22" fill="#e8f1ff" stroke="#bfd5fb"/>
    <text x="263" y="227" text-anchor="middle" class="caps" fill="#1e5db9">NO-OVERLAP MODULE MAP</text>
  </g>

  <!-- Entry point: kept in its own clear region above the diagram -->
  <g class="thai">
    <rect x="490" y="190" width="620" height="100" rx="24" fill="#0b2f67" stroke="#092856" stroke-width="2"/>
    <text x="800" y="225" text-anchor="middle" font-size="17" font-weight="800" fill="#bcd8ff">ENTRY POINT</text>
    <text x="800" y="254" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff">index.html → &lt;script type="module"&gt;</text>
    <text x="800" y="279" text-anchor="middle" font-size="19" font-weight="800" fill="#ffffff">src="/src/main.js"</text>
  </g>

  <!-- Entry arrow runs only in the empty vertical lane -->
  <path d="M800 290 L800 358" fill="none" stroke="#2766c9" stroke-width="7" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="824" y="332" class="thai arrowLabel" fill="#2766c9">starts</text>

  <!-- Cards -->
  <g>
    <rect x="90" y="390" width="320" height="235" rx="26" fill="#ffffff" stroke="#c9dcfb" stroke-width="2"/>
    <rect x="570" y="360" width="460" height="300" rx="30" fill="url(#mainFill)" stroke="#8eb7f5" stroke-width="3"/>
    <rect x="1190" y="390" width="320" height="235" rx="26" fill="#ffffff" stroke="#c9dcfb" stroke-width="2"/>
    <rect x="570" y="730" width="460" height="120" rx="26" fill="#ffffff" stroke="#c9dcfb" stroke-width="2"/>
  </g>

  <!-- api.js -->
  <g class="thai">
    <rect x="120" y="418" width="92" height="34" rx="17" fill="#e6f9f5"/>
    <text x="166" y="441" text-anchor="middle" class="caps" fill="#0c8b79">DATA</text>
    <text x="122" y="496" class="name">api.js</text>
    <text x="122" y="535" class="body">• fetch</text>
    <text x="122" y="570" class="body">• response.ok</text>
    <text x="122" y="605" class="body">• JSON</text>
  </g>

  <!-- main.js -->
  <g class="thai">
    <rect x="605" y="390" width="126" height="36" rx="18" fill="#d8e7ff"/>
    <text x="668" y="414" text-anchor="middle" class="caps" fill="#1f5eb9">ORCHESTRATOR</text>
    <text x="610" y="485" class="name">main.js</text>
    <text x="610" y="535" class="body">• state</text>
    <text x="610" y="572" class="body">• event listeners</text>
    <text x="610" y="609" class="body">• calls modules</text>
    <text x="610" y="638" class="small">ตัดสินใจว่า “เรียกอะไร เมื่อไร”</text>
  </g>

  <!-- ui.js -->
  <g class="thai">
    <rect x="1220" y="418" width="82" height="34" rx="17" fill="#f1eaff"/>
    <text x="1261" y="441" text-anchor="middle" class="caps" fill="#7046d9">UI</text>
    <text x="1222" y="496" class="name">ui.js</text>
    <text x="1222" y="535" class="body">• render cards</text>
    <text x="1222" y="570" class="body">• messages</text>
    <text x="1222" y="605" class="body">• empty state</text>
  </g>

  <!-- utils.js -->
  <g class="thai">
    <rect x="600" y="755" width="112" height="34" rx="17" fill="#fff5d9"/>
    <text x="656" y="778" text-anchor="middle" class="caps" fill="#a66a00">LOGIC</text>
    <text x="730" y="783" class="name">utils.js</text>
    <text x="730" y="819" class="body">• filter &amp; stats &amp; labels</text>
  </g>

  <!-- API lane: two parallel horizontal routes, entirely within blank space -->
  <path d="M570 470 L410 470" fill="none" stroke="#2766c9" stroke-width="7" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="490" y="445" text-anchor="middle" class="thai arrowLabel" fill="#2766c9">1) await fetch</text>
  <path d="M410 550 L570 550" fill="none" stroke="#0f9583" stroke-width="7" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
  <text x="490" y="578" text-anchor="middle" class="thai arrowLabel" fill="#0f9583">2) tasks[]</text>

  <!-- UI lane: two parallel horizontal routes, entirely within blank space -->
  <path d="M1030 470 L1190 470" fill="none" stroke="#2766c9" stroke-width="7" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="1110" y="445" text-anchor="middle" class="thai arrowLabel" fill="#2766c9">5) render(data)</text>
  <path d="M1190 550 L1030 550" fill="none" stroke="#7445d8" stroke-width="7" stroke-linecap="round" marker-end="url(#arrowPurple)"/>
  <text x="1110" y="578" text-anchor="middle" class="thai arrowLabel" fill="#7445d8">6) user event</text>

  <!-- Utils lane: separate vertical input/output rails below main.js -->
  <path d="M700 660 L700 730" fill="none" stroke="#2766c9" stroke-width="7" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="662" y="705" text-anchor="end" class="thai arrowLabel" fill="#2766c9">3) filter / stats</text>
  <path d="M900 730 L900 660" fill="none" stroke="#0f9583" stroke-width="7" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
  <text x="938" y="705" class="thai arrowLabel" fill="#0f9583">4) result</text>

  <!-- Legend: independent of all connectors -->
  <g class="thai">
    <rect x="92" y="760" width="378" height="92" rx="18" fill="#f7fbff" stroke="#c9dcfb"/>
    <text x="118" y="792" font-size="18" font-weight="800" fill="#214d93">อ่านผังนี้อย่างไร</text>
    <text x="118" y="821" font-size="17" fill="#556a8c">เส้นน้ำเงิน = คำสั่งที่ main.js เรียก</text>
    <text x="118" y="845" font-size="17" fill="#556a8c">เส้นเขียว/ม่วง = ข้อมูลหรือ event ที่ส่งกลับ</text>
  </g>

  <g class="thai">
    <rect x="1130" y="760" width="380" height="92" rx="18" fill="#f7fbff" stroke="#c9dcfb"/>
    <text x="1158" y="792" font-size="18" font-weight="800" fill="#214d93">คำถามสำหรับชั้นเรียน</text>
    <text x="1158" y="821" font-size="17" fill="#556a8c">“ถ้าต้อง sort tasks by minutes</text>
    <text x="1158" y="845" font-size="17" fill="#556a8c">ควรเพิ่มใน module ใด เพราะอะไร?”</text>
  </g>
</svg>
