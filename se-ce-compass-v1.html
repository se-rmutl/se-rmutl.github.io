                { q: "11. คุณชอบทำงานในสภาพแวดล้อมแบบใดมากกว่ากัน?", opts: [{ t: "ห้องปฏิบัติการฮาร์ดแวร์ มีเครื่องมือวัดไฟ อุปกรณ์บัดกรี และแผงวงจร", k: "coe_hw", w: 3 }, { t: "หน้าจอที่มี Terminal หลายหน้าจอ มอนิเตอร์ข้อมูลเครือข่ายและระบบ", k: "coe_net", w: 3 }, { t: "พื้นที่ทดสอบหุ่นยนต์และอุปกรณ์เคลื่อนที่ในสถานการณ์จริง", k: "coe_robot", w: 3 }] },
                { q: "12. เวลาใช้ Wi-Fi หรือ 5G คุณเคยสงสัยเรื่องใดมากที่สุด?", opts: [{ t: "ข้อมูลวิ่งผ่านอากาศและสายไฟเบอร์ออปติกข้ามโลกได้อย่างไรโดยไม่สูญหาย", k: "coe_net", w: 3 }, { t: "เราจะเข้ารหัสสัญญาณอย่างไรไม่ให้คนที่ดักจับข้อมูลกลางทางอ่านออก", k: "coe_sec", w: 3 }, { t: "ชิปโมเด็มในโทรศัพท์จัดการสัญญาณความถี่สูงๆ ได้อย่างไร", k: "coe_hw", w: 3 }] },
                { q: "13. ข้อใดคือความสนุกในการเขียนภาษา C/C++ หรือ Assembly ในมุมของคุณ?", opts: [{ t: "การได้ควบคุมหน่วยความจำ (Memory) และฮาร์ดแวร์ได้ดั่งใจนึก", k: "coe_hw", w: 3 }, { t: "การเขียนโค้ดให้รันได้เร็วที่สุดเพื่อการตอบสนองของหุ่นยนต์ในเสี้ยววินาที", k: "coe_robot", w: 3 }, { t: "การเขียนเฟิร์มแวร์ลงชิปเล็กๆ ที่กินแบตเตอรี่ต่ำมาก", k: "coe_iot", w: 3 }] },
                { q: "14. คุณให้ความสำคัญกับสิ่งใดมากที่สุดในการสร้างระบบคอมพิวเตอร์?", opts: [{ t: "ความมั่นคงปลอดภัย ป้องกันการถูกโจมตีได้ 100% (Security)", k: "coe_sec", w: 3 }, { t: "ความเร็วในการส่งผ่านข้อมูลและความเสถียรของเครือข่าย (Reliability)", k: "coe_net", w: 3 }, { t: "ประสิทธิภาพการประมวลผลต่อพลังงานที่ใช้ (Performance/Watt)", k: "coe_hw", w: 3 }] },
                { q: "15. ข่าวสารใดที่ทำให้คุณต้องกดเข้าไปอ่านทันที?", opts: [{ t: "ข่าวการโดนแฮกข้อมูลบริษัทใหญ่ หรือช่องโหว่ Zero-day ใหม่", k: "coe_sec", w: 3 }, { t: "ข่าวสถาปัตยกรรมชิปรุ่นใหม่ (เช่น Apple M-series, Nvidia AI Chip)", k: "coe_hw", w: 3 }, { t: "ข่าวหุ่นยนต์ฮิวแมนนอยด์ (Humanoid Robotics) และรถยนต์ไร้คนขับ", k: "coe_robot", w: 3 }] },
                { q: "16. เวลาเห็นกล้องวงจรปิดอัจฉริยะตามท้องถนน คุณสนใจกลไกส่วนใด?", opts: [{ t: "การประมวลผลภาพจับใบหน้า (AI Vision) ที่ทำงานบนตัวกล้องทันที", k: "coe_iot", w: 3 }, { t: "การส่งข้อมูลผ่านเครือข่ายความเร็วสูงกลับไปยังศูนย์ควบคุม", k: "coe_net", w: 3 }, { t: "ระบบป้องกันไม่ให้ผู้ไม่หวังดีแฮกเข้ามาดูภาพในกล้องได้", k: "coe_sec", w: 3 }] },
                { q: "17. ถ้าคุณต้องอธิบายตัวตนของ 'วิศวกรคอมพิวเตอร์' ให้คนอื่นฟัง คุณจะบอกว่าคือ...", opts: [{ t: "ผู้สร้างสะพานเชื่อมระหว่างโลกฮาร์ดแวร์และซอฟต์แวร์", k: "coe_hw", w: 3 }, { t: "ผู้สร้างระบบสมองกลและหุ่นยนต์ที่เปลี่ยนโลกกายภาพ", k: "coe_robot", w: 3 }, { t: "ผู้ปกป้องระบบดิจิทัลและโครงข่ายการสื่อสารของโลก", k: "coe_sec", w: 3 }] },
                { q: "18. ในอนาคตคุณอยากร่วมงานกับบริษัทลักษณะใดมากที่สุด?", opts: [{ t: "บริษัทออกแบบชิปและฮาร์ดแวร์ระดับโลก (เช่น AMD, Intel, ARM, Nvidia)", k: "coe_hw", w: 3 }, { t: "บริษัทพัฒนาหุ่นยนต์และยานยนต์ไฟฟ้า (เช่น Tesla, Boston Dynamics)", k: "coe_robot", w: 3 }, { t: "บริษัทโทรคมนาคม คลาวด์ หรือ Cyber Security ชั้นนำ", k: "coe_sec", w: 3 }, { t: "บริษัทพัฒนาอุปกรณ์ Smart Device และ IoT สตาร์ตอัป", k: "coe_iot", w: 3 }] },
                { q: "19. สิ่งใดคือความท้าทายที่คุณอยากเอาชนะให้ได้ใน 4 ปีนี้?", opts: [{ t: "การสร้างหุ่นยนต์หรือฮาร์ดแวร์ที่ทำงานได้จริงด้วยมือตัวเอง", k: "coe_robot", w: 3 }, { t: "การได้ใบรับรอง (Certificates) ระดับโลกด้าน Security หรือ Network", k: "coe_sec", w: 3 }, { t: "การเข้าใจสถาปัตยกรรมคอมพิวเตอร์ลึกซึ้งถึงระดับลอจิกเกต", k: "coe_hw", w: 3 }] },
                { q: "20. สุดท้ายแล้ว คุณรู้สึกภูมิใจกับสิ่งใดมากที่สุด?", opts: [{ t: "การได้เห็นวงจรหรือฮาร์ดแวร์ที่เราออกแบบ กะพริบไฟและรันงานได้สำเร็จ", k: "coe_hw", w: 3 }, { t: "การที่ระบบเครือข่ายและเซิร์ฟเวอร์ที่เราดูแล ปลอดภัยและไม่เคยล่ม", k: "coe_net", w: 3 }, { t: "การได้สร้างอุปกรณ์อัจฉริยะที่ช่วยอำนวยความสะดวกในชีวิตผู้คน", k: "coe_iot", w: 3 }] }
            ]
        };

        // App State
        let currentMajor = 'SE';
        let currentQIndex = 0;
        let scores = {};
        let studentData = {};

        function initScores() {
            scores = {};
            Object.keys(TRACK_DATA).forEach(k => scores[k] = 0);
        }

        function startQuiz() {
            const nick = document.getElementById('input-nick').value.trim();
            const name = document.getElementById('input-name').value.trim();
            const id = document.getElementById('input-id').value.trim();
            currentMajor = document.getElementById('select-major').value;

            if (!nick || !name) {
                alert('⚠️ กรุณากรอก "ชื่อเล่น" และ "ชื่อ-นามสกุล" ก่อนเริ่มการประเมิน');
                return;
            }

            studentData = { nick, name, id: id || '-', major: currentMajor };
            initScores();
            currentQIndex = 0;

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            const badge = document.getElementById('quiz-major-badge');
            badge.innerText = currentMajor === 'SE' ? '💻 SE Major (20 คำถาม)' : '⚙️ CoE Major (20 คำถาม)';
            badge.className = `px-2.5 py-0.5 rounded-md font-semibold ${currentMajor === 'SE' ? 'bg-cyan-500/20 text-cyan-400' : 'bg-blue-500/20 text-blue-400'}`;

            renderQuestion();
        }

        function renderQuestion() {
            const qList = QUESTIONS_DATABASE[currentMajor];
            const qData = qList[currentQIndex];

            // Progress
            document.getElementById('quiz-progress-text').innerText = `${currentQIndex + 1} / ${qList.length}`;
            const pct = ((currentQIndex + 1) / qList.length) * 100;
            document.getElementById('quiz-progress-bar').style.width = `${pct}%`;

            // Text
            document.getElementById('question-text').innerText = qData.q;

            // Options
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            qData.opts.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-4 rounded-xl bg-slate-900/80 hover:bg-slate-800 option-card flex items-center justify-between group text-sm md:text-base';
                btn.innerHTML = `
                    <span class="text-slate-200 group-hover:text-primary transition-colors">${opt.t}</span>
                    <span class="text-slate-600 group-hover:text-primary ml-2">➔</span>
                `;
                btn.onclick = () => selectOption(opt.k, opt.w);
                container.appendChild(btn);
            });
        }

        function selectOption(trackKey, weight) {
            if (scores[trackKey] !== undefined) {
                scores[trackKey] += weight;
            }
            
            currentQIndex++;
            if (currentQIndex < QUESTIONS_DATABASE[currentMajor].length) {
                renderQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('results-screen').classList.remove('hidden');

            // User Info
            document.getElementById('result-user-info').innerText = 
                `นักศึกษา: ${studentData.name} (${studentData.nick}) | รหัส: ${studentData.id} | หลักสูตร: ${studentData.major === 'SE' ? 'วิศวกรรมซอฟต์แวร์' : 'วิศวกรรมคอมพิวเตอร์'}`;

            // Filter only current major tracks
            const prefix = studentData.major.toLowerCase() + '_';
            const relevantTracks = Object.keys(scores).filter(k => k.startsWith(prefix));
            
            // Calculate total for percentages
            let totalScore = relevantTracks.reduce((sum, k) => sum + scores[k], 0);
            if (totalScore === 0) totalScore = 1;

            // Sort
            relevantTracks.sort((a, b) => scores[b] - scores[a]);

            // Render Bars
            const barsContainer = document.getElementById('result-bars');
            barsContainer.innerHTML = '';

            relevantTracks.forEach((k, idx) => {
                const s = scores[k];
                const pct = Math.round((s / totalScore) * 100);
                const tData = TRACK_DATA[k];
                const isTop = idx === 0;

                barsContainer.innerHTML += `
                    <div class="space-y-1">
                        <div class="flex justify-between font-medium ${isTop ? 'text-primary font-bold' : 'text-slate-300'}">
                            <span>${tData.title}</span>
                            <span>${pct}% (${s} pts)</span>
                        </div>
                        <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                            <div class="${isTop ? 'bg-gradient-to-r from-primary to-secondary' : 'bg-slate-600'} h-full rounded-full" style="width: ${pct}%"></div>
                        </div>
                    </div>
                `;
            });

            // Render Primary Card
            const topKey = relevantTracks[0];
            const topData = TRACK_DATA[topKey];
            document.getElementById('primary-card').innerHTML = `
                <div class="flex items-center justify-between border-b border-slate-700/60 pb-3">
                    <span class="text-xs font-bold px-2.5 py-1 bg-primary/20 text-primary rounded-full">🏆 แนวถนัดอันดับ 1 (Primary Track)</span>
                    <span class="text-xs text-slate-400">เป้าหมายโฟกัสปี 1-3</span>
                </div>
                <h3 class="text-lg md:text-xl font-bold text-white">${topData.title}</h3>
                <p class="text-xs md:text-sm text-slate-300 leading-relaxed">${topData.desc}</p>
                <div class="space-y-2 pt-2 border-t border-slate-700/60 text-xs md:text-sm">
                    <div><span class="text-primary font-semibold">💡 ทักษะและเครื่องมือสำคัญ:</span> <span class="text-slate-300">${topData.skills}</span></div>
                    <div><span class="text-cyan-400 font-semibold">🎯 อาชีพในอนาคต (2026+):</span> <span class="text-slate-300">${topData.careers}</span></div>
                    <div><span class="text-blue-400 font-semibold">📚 รายวิชาปี 1-2 ที่ควรตั้งใจเป็นพิเศษ:</span> <span class="text-slate-300">${topData.courses}</span></div>
                </div>
            `;

            // Render Secondary Card
            const secKey = relevantTracks[1];
            if (secKey && scores[secKey] > 0) {
                const secData = TRACK_DATA[secKey];
                document.getElementById('secondary-card').innerHTML = `
                    <div class="text-xs font-semibold text-slate-400">🥈 แนวถนัดอันดับ 2 (Secondary Track / สายรอง)</div>
                    <div class="font-bold text-slate-200">${secData.title}</div>
                    <div class="text-xs text-slate-400">${secData.desc}</div>
                `;
            } else {
                document.getElementById('secondary-card').innerHTML = `<div class="text-xs text-slate-500 text-center">ยังไม่มีคะแนนสายรองที่เด่นชัด แนะนำให้ลองศึกษาหลายๆ ด้านในปี 1</div>`;
            }
        }

        function captureResult() {
            const target = document.getElementById('app-container');
            html2canvas(target, { scale: 2, backgroundColor: '#0a0f1d' }).then(canvas => {
                const link = document.createElement('a');
                link.download = `CareerCompass_${studentData.major}_${studentData.nick || 'student'}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
