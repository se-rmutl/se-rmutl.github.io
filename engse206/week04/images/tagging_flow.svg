<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
        <rect width="900" height="450" fill="transparent"/>
        <rect x="350" y="20" width="200" height="60" rx="30" fill="#3b82f6"/>
        <text x="450" y="58" fill="white" font-family="sans-serif" font-size="22" font-weight="bold" text-anchor="middle">วิเคราะห์ข้อความ</text>
        
        <!-- Lines -->
        <path d="M 450 80 L 450 120" stroke="#64748b" stroke-width="3" fill="none"/>
        <path d="M 200 120 L 700 120" stroke="#64748b" stroke-width="3" fill="none"/>
        <path d="M 200 120 L 200 160" stroke="#64748b" stroke-width="3" fill="none"/>
        <path d="M 450 120 L 450 160" stroke="#64748b" stroke-width="3" fill="none"/>
        <path d="M 700 120 L 700 160" stroke="#64748b" stroke-width="3" fill="none"/>
        
        <!-- FACT -->
        <rect x="70" y="160" width="260" height="120" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="3"/>
        <text x="200" y="200" fill="#f8fafc" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">บอกสิ่งที่เกิดขึ้น?</text>
        <text x="200" y="230" fill="#94a3b8" font-family="sans-serif" font-size="16" text-anchor="middle">มี Source ชัดเจน ภายในขอบเขต?</text>
        <path d="M 200 280 L 200 320" stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#arrow-g)"/>
        <rect x="120" y="320" width="160" height="50" rx="25" fill="#10b981"/>
        <text x="200" y="353" fill="white" font-family="sans-serif" font-size="22" font-weight="bold" text-anchor="middle">FACT</text>
        
        <!-- NEED -->
        <rect x="340" y="160" width="220" height="120" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="3"/>
        <text x="450" y="200" fill="#f8fafc" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">บอกผลลัพธ์ที่ต้องการ?</text>
        <text x="450" y="230" fill="#94a3b8" font-family="sans-serif" font-size="16" text-anchor="middle">เพื่อใช้ทำงาน/ตัดสินใจ?</text>
        <path d="M 450 280 L 450 320" stroke="#3b82f6" stroke-width="3" fill="none" marker-end="url(#arrow-b)"/>
        <rect x="370" y="320" width="160" height="50" rx="25" fill="#3b82f6"/>
        <text x="450" y="353" fill="white" font-family="sans-serif" font-size="22" font-weight="bold" text-anchor="middle">NEED</text>
        
        <!-- UNKNOWN -->
        <rect x="580" y="160" width="250" height="120" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="3"/>
        <text x="705" y="200" fill="#f8fafc" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Source ไม่รู้/ข้อมูลขัดแย้ง?</text>
        <text x="705" y="230" fill="#94a3b8" font-family="sans-serif" font-size="16" text-anchor="middle">ทีมยังไม่มี Authority ตัดสินใจ?</text>
        <path d="M 705 280 L 705 320" stroke="#ef4444" stroke-width="3" fill="none" marker-end="url(#arrow-r)"/>
        <rect x="625" y="320" width="160" height="50" rx="25" fill="#ef4444"/>
        <text x="705" y="353" fill="white" font-family="sans-serif" font-size="22" font-weight="bold" text-anchor="middle">UNKNOWN</text>
        
        <defs>
            <marker id="arrow-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" /></marker>
            <marker id="arrow-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" /></marker>
            <marker id="arrow-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" /></marker>
        </defs>
    </svg>